<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ore Lavoro" />
  <title>Ore Lavoro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: #e8e4dc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(env(safe-area-inset-top), 48px) 20px 60px;
    }

    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 0.08em;
      color: #e8e4dc;
      margin-bottom: 6px;
      line-height: 1;
    }

    .app-sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 32px;
    }

    /* TOTALE */
    .total-box {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 20px 28px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 10px;
    }

    .total-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .total-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4px;
    }

    .total-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 0.04em;
      color: #c8ff57;
      line-height: 1;
    }

    .total-unit {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .total-days {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.08em;
      text-align: right;
      margin-top: 4px;
    }

    .total-breakdown {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #1a1a2a;
      display: flex;
      justify-content: space-between;
    }

    .breakdown-item {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.06em;
    }

    .breakdown-item span {
      color: #666;
      font-size: 13px;
    }

    .btn-edit-balance {
      background: none;
      border: 1px solid #252535;
      color: #555;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
      white-space: nowrap;
      margin-top: 2px;
    }

    .btn-edit-balance:active { border-color: #c8ff57; color: #c8ff57; }

    /* MODAL SALDO */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #12121a;
      border: 1px solid #252535;
      border-radius: 20px;
      padding: 28px 24px;
      width: calc(100% - 48px);
      max-width: 320px;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal input {
      background: #16161f;
      border: 1px solid #252535;
      border-radius: 10px;
      color: #e8e4dc;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.05em;
      padding: 14px 18px;
      width: 100%;
      outline: none;
      text-align: center;
      margin-bottom: 16px;
    }

    .modal input:focus { border-color: #c8ff57; }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-modal-cancel {
      flex: 1;
      background: none;
      border: 1px solid #252535;
      color: #555;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-modal-save {
      flex: 2;
      background: #c8ff57;
      border: none;
      color: #0a0a0f;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.1em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-modal-save:active { opacity: 0.85; }
    .btn-modal-cancel:active { opacity: 0.6; }

    /* FORM */
    .form-box {
      background: #0e0e16;
      border: 1px solid #1a1a2a;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 28px;
      margin-top: 18px;
    }

    .form-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .input-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }

    input[type="date"], input[type="number"] {
      background: #16161f;
      border: 1px solid #252535;
      border-radius: 10px;
      color: #e8e4dc;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 14px;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="date"]:focus, input[type="number"]:focus {
      border-color: #c8ff57;
    }

    input[type="number"] {
      width: 90px;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
    }

    .btn-add {
      background: #c8ff57;
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      width: 52px;
      height: 48px;
      font-size: 26px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-add:active { transform: scale(0.93); }

    .error-msg {
      font-size: 11px;
      color: #ff4d6d;
      letter-spacing: 0.08em;
      margin-top: 10px;
      min-height: 16px;
    }

    /* LISTA */
    .list-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 12px;
      width: 100%;
      max-width: 360px;
    }

    .entry-row {
      background: #111118;
      border: 1px solid #1a1a28;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 8px;
      width: 100%;
      max-width: 360px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .entry-date { font-size: 13px; color: #888; letter-spacing: 0.05em; }
    .entry-weekday { font-size: 10px; color: #444; margin-top: 3px; letter-spacing: 0.08em; }

    .entry-right { display: flex; align-items: center; gap: 14px; }

    .entry-hours {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 0.04em;
      color: #e8e4dc;
    }

    .entry-hours span {
      font-size: 12px;
      color: #555;
      font-family: 'DM Mono', monospace;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #2a2a3a;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active { color: #ff4d6d; }

    .empty-state {
      font-size: 12px;
      color: #2a2a3a;
      letter-spacing: 0.08em;
      margin-top: 8px;
      text-align: center;
      line-height: 1.8;
    }

    .btn-reset {
      background: none;
      border: 1px solid #1e1e2e;
      color: #333;
      border-radius: 20px;
      padding: 8px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      margin-top: 20px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-reset:active { color: #ff4d6d; border-color: #ff4d6d; }
  </style>
</head>
<body>

  <h1 class="app-title">ORE LAVORO</h1>
  <p class="app-sub">registro giornaliero</p>

  <!-- TOTALE -->
  <div class="total-box">
    <div class="total-top">
      <div>
        <div class="total-label">Totale ore</div>
        <div class="total-value" id="totalHours">0</div>
        <div class="total-unit">ore lavorate</div>
      </div>
      <div style="text-align:right">
        <button class="btn-edit-balance" onclick="openModal()">✏️ Saldo iniziale</button>
        <div class="total-days" id="totalDays" style="margin-top:8px">0 giorni</div>
      </div>
    </div>
    <div class="total-breakdown" id="breakdown" style="display:none">
      <div class="breakdown-item">Saldo iniziale: <span id="balanceDisplay">0</span> ore</div>
      <div class="breakdown-item">Aggiunte: <span id="addedDisplay">0</span> ore</div>
    </div>
  </div>

  <!-- MODAL SALDO INIZIALE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Saldo iniziale</div>
      <div class="modal-sub">Inserisci le ore da cui vuoi partire.<br/>Es: 520 se hai già lavorato 520 ore.</div>
      <input type="number" id="balanceInput" min="0" step="0.5" placeholder="500" />
      <div class="modal-buttons">
        <button class="btn-modal-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-modal-save" onclick="saveBalance()">SALVA</button>
      </div>
    </div>
  </div>

  <!-- FORM INSERIMENTO -->
  <div class="form-box">
    <div class="form-title">Aggiungi giornata</div>
    <div class="form-row">
      <div class="input-group">
        <div class="input-label">Data</div>
        <input type="date" id="inputDate" />
      </div>
      <div class="input-group" style="max-width:90px">
        <div class="input-label">Ore</div>
        <input type="number" id="inputHours" min="0.5" max="24" step="0.5" placeholder="8" />
      </div>
      <button class="btn-add" onclick="addEntry()">+</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="list-title" id="listTitle" style="display:none">Giorni registrati</div>
  <div id="entriesList"></div>
  <p class="empty-state" id="emptyState">Nessuna giornata ancora.<br/>Inserisci data e ore qui sopra!</p>
  <button class="btn-reset" id="resetBtn" style="display:none" onclick="resetAll()">AZZERA TUTTO</button>

  <script>
    let entries = JSON.parse(localStorage.getItem('ore-lavoro-v2') || '[]');
    let balance = parseFloat(localStorage.getItem('ore-lavoro-balance') || '0');

    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];

    function save() {
      localStorage.setItem('ore-lavoro-v2', JSON.stringify(entries));
      localStorage.setItem('ore-lavoro-balance', balance);
    }

    function openModal() {
      document.getElementById('balanceInput').value = balance || '';
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('balanceInput').focus(), 200);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function saveBalance() {
      const val = parseFloat(document.getElementById('balanceInput').value);
      if (isNaN(val) || val < 0) { alert('Inserisci un numero valido.'); return; }
      balance = val;
      save();
      closeModal();
      render();
    }

    function formatDateIT(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    function getWeekday(dateStr) {
      const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      return days[new Date(dateStr + 'T12:00:00').getDay()];
    }

    function addEntry() {
      const dateVal = document.getElementById('inputDate').value;
      const hoursVal = parseFloat(document.getElementById('inputHours').value);
      const errEl = document.getElementById('errorMsg');

      if (!dateVal) { errEl.textContent = 'Inserisci una data.'; return; }
      if (!hoursVal || hoursVal <= 0 || hoursVal > 24) { errEl.textContent = 'Inserisci ore valide (0.5 – 24).'; return; }

      errEl.textContent = '';

      const existing = entries.find(e => e.date === dateVal);
      if (existing) {
        existing.hours = parseFloat((existing.hours + hoursVal).toFixed(1));
      } else {
        entries.push({ date: dateVal, hours: hoursVal });
        entries.sort((a, b) => b.date.localeCompare(a.date));
      }

      save();
      document.getElementById('inputHours').value = '';
      render();
    }

    function deleteEntry(date) {
      entries = entries.filter(e => e.date !== date);
      save();
      render();
    }

    function resetAll() {
      if (confirm('Vuoi cancellare tutte le giornate e il saldo iniziale?')) {
        entries = [];
        balance = 0;
        save();
        render();
      }
    }

    function render() {
      const added = entries.reduce((acc, e) => acc + e.hours, 0);
      const total = balance + added;

      document.getElementById('totalHours').textContent = total % 1 === 0 ? total : total.toFixed(1);
      document.getElementById('totalDays').textContent = entries.length + (entries.length === 1 ? ' giorno' : ' giorni');

      // Breakdown visibile solo se c'è un saldo iniziale
      if (balance > 0) {
        document.getElementById('breakdown').style.display = 'flex';
        document.getElementById('balanceDisplay').textContent = balance % 1 === 0 ? balance : balance.toFixed(1);
        document.getElementById('addedDisplay').textContent = added % 1 === 0 ? added : added.toFixed(1);
      } else {
        document.getElementById('breakdown').style.display = 'none';
      }

      const list = document.getElementById('entriesList');
      const empty = document.getElementById('emptyState');
      const listTitle = document.getElementById('listTitle');
      const resetBtn = document.getElementById('resetBtn');

      if (entries.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        listTitle.style.display = 'none';
        resetBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      listTitle.style.display = 'block';
      resetBtn.style.display = 'inline-block';

      list.innerHTML = entries.map(e => `
        <div class="entry-row">
          <div>
            <div class="entry-date">${formatDateIT(e.date)}</div>
            <div class="entry-weekday">${getWeekday(e.date)}</div>
          </div>
          <div class="entry-right">
            <div class="entry-hours">${e.hours % 1 === 0 ? e.hours : e.hours.toFixed(1)} <span>ore</span></div>
            <button class="btn-delete" onclick="deleteEntry('${e.date}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Chiudi modal toccando fuori
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    render();
  </script>
</body>
</html>
